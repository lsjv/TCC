<h2>Turma {{ turma.nome }}</h2>

<table border="1">

<tr>
<th>Horário</th>

{% for dia in dias %}
<th>{{ dia }}</th>
{% endfor %}

</tr>

{% for linha in grade %}
<tr>

<td>{{ forloop.counter }}ª aula</td>

{% for aula in linha %}
<td>

{% if aula %}
{{ aula.turma_disciplina.disciplina.nome }}
{% endif %}

</td>
{% endfor %}

</tr>
{% endfor %}

</table>
